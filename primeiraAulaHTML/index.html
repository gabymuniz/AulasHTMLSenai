<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Primeira aula Html</title>
    <link rel="icon" type="image/png" href="https://w7.pngwing.com/pngs/222/282/png-transparent-computer-icons-internet-world-wide-web-text-trademark-logo.png">

</head>
<body>
    <h1 style="display: flex; justify-content: center; color: cadetblue;">Acessar o Sistema</h1>
    <form action="" style="display: flex; flex-direction: column; justify-content: first baseline; align-items: first baseline; background-color: cadetblue; color: white;">
        <div>
            <label for="campo-email">Email: </label>
            <input style="margin: 10px;" type="email" id="campo-email" placeholder="Ex: nome@email.com">
        </div>

        <div>
            <label for="campo-senha">Senha: </label>
            <input style="margin: 10px;" type="password" id="campo-senha">
        </div>
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: flex-end; height: 30px;">
            <button style="padding: 5px; color: cadetblue; background-color: white; border-radius: 8px;" type="submit">Entrar</button>
        </div>
    </form>
   <br>  <p>
        <a href="forgotPassword.html">Esqueci minha senha</a> |
        <a href="cadastro.html"> Criar uma conta</a>
    </p>
</body>
</html>
