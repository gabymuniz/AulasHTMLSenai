<!DOCTYPE html>
<html lang='pt-BR'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Primeira aula Html</title>
    <link rel="icon" type="image/png" href="https://w7.pngwing.com/pngs/222/282/png-transparent-computer-icons-internet-world-wide-web-text-trademark-logo.png">

</head>
<body>
    <h1 style="display: flex; justify-content: center; color: cadetblue;">Cadastro</h1>
    <form action="" style="display: flex; flex-direction: column; justify-content: first baseline; align-items: first baseline; background-color: cadetblue; color: white;">
       
         <div>
            <label style="margin: 10px;" for="campo-nome">Nome: </label>
            <input style="margin: 20px;" type="nome" id="campo-nome" placeholder="Ex: Pedro">
        </div>
        <div>
            <label style="margin: 10px;" for="campo-sobrenome">Sobrenome: </label>
            <input style="margin: 20px; margin-left: -15px;" type="sobrenome" id="campo-sobrenome" placeholder="Ex: Dias Cabral">
        </div>
        <div>
            <label style="margin: 10px;" for="campo-email">Email: </label>
            <input  style="margin: 20px;" type="email" id="campo-email" placeholder="Ex: nome@email.com">
        </div>

        <div>
            <label style="margin: 10px;"for="campo-senha">Senha: </label>
            <input style="margin: 20px;" type="password" id="campo-senha">
        </div>
        <div style="display: flex; justify-content: center; align-items: center; height: 30px;">
            <button style="margin: 20px;" style="padding: 5px; color: cadetblue; background-color: white; border-radius: 8px;" type="submit">Cadastrar</button>
        </div>
    </form>
   <br>  <p>
        <a href="/primeiraAulaHTML/index.html">Acessar Sistema</a> |
        <a href="index.html"> Página inicial</a>
    </p>
</body>
</html>
